# =============================================
# CONFIGURATION BASE DE DONN…ES - MySQL (XAMPP)
# =============================================

# URL de connexion JDBC
spring.datasource.url=jdbc:mysql://localhost:3306/nutrici_db?useSSL=false&serverTimezone=UTC

# Identifiants MySQL (XAMPP = mot de passe vide)
spring.datasource.username=root
spring.datasource.password=

# =============================================
# CONFIGURATION HIBERNATE / JPA
# =============================================

# Crťation automatique des tables
spring.jpa.hibernate.ddl-auto=update

# Affichage des requÍtes SQL dans la console
spring.jpa.show-sql=true

# Formatage des requÍtes SQL pour lisibilitť
spring.jpa.properties.hibernate.format_sql=true

# =============================================
# CONFIGURATION LOGS (Optionnel)
# =============================================

# Dťsactiver le warning open-in-view
spring.jpa.open-in-view=false